<div class="container-fluid p-4">
  <h2 class="purple-title fw-bold mb-4">Your Shopping Cart</h2>

  <div *ngIf="items.length === 0" class="text-center py-5 shadow-sm rounded-4 bg-white">
    <h4 class="text-muted">Giỏ hàng đang trống không à... 💜</h4>
    <button class="btn btn-mickey mt-3" routerLink="/products">Quay lại Shopping ngay</button>
  </div>

  <div *ngIf="items.length > 0" class="card border-0 shadow-sm rounded-4 overflow-hidden">
    <table class="table table-hover align-middle mb-0">
      <thead class="purple-thead">
        <tr>
          <th>Sản phẩm</th>
          <th class="text-center">Đơn giá</th>
          <th class="text-center">Số lượng</th>
          <th class="text-center">Thành tiền</th>
          <th class="text-center">Hành động</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of items; let i = index">
          <td>
            <div class="d-flex align-items-center">
              <img [src]="item.image" class="rounded-3 me-3" width="60" height="60" style="object-fit: cover;">
              <div>
                <div class="fw-bold">{{item.name}}</div>
                <small class="text-muted">{{item.model}}</small>
              </div>
            </div>
          </td>
          <td class="text-center">${{item.price}}</td>
          <td class="text-center">
            <div class="d-flex justify-content-center align-items-center gap-2">
              <button class="btn btn-sm btn-outline-purple" (click)="updateQty(i, -1)">-</button>
              <span class="fw-bold mx-2">{{item.quantity}}</span>
              <button class="btn btn-sm btn-outline-purple" (click)="updateQty(i, 1)">+</button>
            </div>
          </td>
          <td class="text-center fw-bold text-purple">${{item.price * item.quantity | number}}</td>
          <td class="text-center">
            <button class="btn btn-sm btn-danger rounded-pill px-3" (click)="remove(i)">Remove</button>
          </td>
        </tr>
      </tbody>
    </table>

    <div class="card-footer bg-white p-4">
      <div class="row align-items-center">
        <div class="col-md-6">
          <button class="btn btn-outline-secondary rounded-pill" routerLink="/products">Mua thêm sản phẩm</button>
        </div>
        <div class="col-md-6 text-end">
          <h4 class="mb-3">Tổng cộng: <span class="price-text">${{total | number}}</span></h4>
          <button class="btn btn-pay btn-lg w-100 fw-bold shadow-sm" (click)="pay()">
            FINISH PAYMENT 💜
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
