<div class="container" *ngIf="fashion" style="max-width: 800px; margin: auto; padding: 40px 20px;">
  <div class="fashion-content" [innerHTML]="fashion.details" style="font-size: 1.1em; line-height: 1.6;"></div>
  
  <div style="margin-top: 30px; text-align: center;">
    <img [src]="fashion.thumbnail" style="width: 100%; max-width: 600px; border-radius: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
  </div>

  <div style="margin-top: 40px; text-align: center;">
    <button routerLink="/ex58-client" style="border: 1px solid #000; background: none; padding: 10px 30px; cursor: pointer;">BACK TO SHOP</button>
  </div>
</div>
