<div class="container">
  <h2>Fashion Administration</h2>
  <button (click)="_router.navigate(['/ex58-admin-add'])">Add a new Fashion</button>
  
  <table border="1" style="width:100%; margin-top: 20px;">
    <thead>
      <tr>
        <th>Thumbnail</th>
        <th>Title</th>
        <th>Style</th>
        <th>Created Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let f of fashions">
        <td><img [src]="f.thumbnail" width="60"></td>
        <td>{{f.title}}</td>
        <td>{{f.style}}</td>
        <td>{{f.created_at | date:'dd/MM/yyyy'}}</td>
        <td>
          <button (click)="_router.navigate(['/ex58-admin-edit', f._id])">Edit</button>
          <button (click)="deleteFashion(f._id!)">Delete</button>
        </td>
      </tr>
    </tbody>
  </table>
</div>
