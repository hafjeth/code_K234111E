<div class="container" style="padding: 20px;">
  <h2>{{ isEdit ? 'EDIT FASHION' : 'ADD NEW FASHION' }}</h2>
  <hr>

  <div class="form-group">
    <label>Fashion Title:</label>
    <input type="text" [(ngModel)]="fashion.title" class="form-control" placeholder="Nhập tên thời trang">
  </div>

  <div class="form-group">
    <label>Style:</label>
    <select [(ngModel)]="fashion.style" class="form-control">
      <option value="Street Style">Street Style</option>
      <option value="Trends">Trends</option>
      <option value="Nàng thơ">Nàng thơ</option>
      <option value="Dark Academia">Dark Academia</option>
    </select>
  </div>

  <div class="form-group">
    <label>Thumbnail URL:</label>
    <input type="text" [(ngModel)]="fashion.thumbnail" class="form-control">
    <img [src]="fashion.thumbnail" width="100" *ngIf="fashion.thumbnail" style="margin-top: 10px;">
  </div>

  <div class="form-group">
    <label>Fashion Details (WYSIWYG):</label>
    <angular-editor [(ngModel)]="fashion.details" [config]="editorConfig"></angular-editor>
  </div>

  <div style="margin-top: 20px;">
    <button (click)="save()" class="btn btn-success">SAVE</button>
    <button (click)="_router.navigate(['/ex58-admin'])" class="btn btn-secondary">BACK</button>
  </div>
</div>
