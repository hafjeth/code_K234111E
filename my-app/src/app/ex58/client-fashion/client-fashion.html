<div class="client-container" style="max-width: 1200px; margin: auto; font-family: Arial, sans-serif;">
  <div style="text-align: center; margin: 30px 0;">
    <input type="text" [(ngModel)]="searchStyle" placeholder="Nhập Style hoặc chọn từ dropdown..." style="padding: 10px; width: 300px;">
    <button (click)="filterByStyle()" style="padding: 10px 20px; background: #000; color: #fff; cursor: pointer;">SEARCH</button>
  </div>

  <div class="style-section">
    <h3 style="text-align: center; letter-spacing: 2px; border-bottom: 2px solid #000; padding-bottom: 10px; margin-bottom: 30px;">
      {{ searchStyle ? (searchStyle | uppercase) : 'ALL TRENDS' }}
    </h3>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 30px;">
      <div *ngFor="let f of fashions" class="fashion-card" style="text-align: center; border: 1px solid #f0f0f0; padding: 10px; transition: 0.3s;">
        <div (click)="viewDetail(f._id!)" style="cursor: pointer; overflow: hidden; height: 350px;">
          <img [src]="f.thumbnail" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <h5 style="margin: 15px 0 5px; font-weight: bold; text-transform: uppercase;">{{f.title}}</h5>
        <p style="color: #666; font-size: 0.85em; margin: 0;">{{f.style}}</p>
      </div>
    </div>
  </div>
</div>
