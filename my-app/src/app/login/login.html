<div class="container mt-4">
  <div class="card" style="width: 18rem;">
    <div class="card-header">Login System</div>
    <div class="card-body">
      <div class="mb-3">
        <label for="name-reg" class="form-label">User Name:</label>
        <input type="text" class="form-control" id="name-reg" [(ngModel)]="user.username">
      </div>
      <div class="mb-3">
        <label for="password-reg" class="form-label">Password</label>
        <input type="password" class="form-control" id="password-reg" [(ngModel)]="user.password">
      </div>
      <button class="btn btn-primary" (click)="onLogin()">Login</button>
      <p class="mt-2 text-danger" *ngIf="message">{{message}}</p>
    </div>
  </div>
</div>
