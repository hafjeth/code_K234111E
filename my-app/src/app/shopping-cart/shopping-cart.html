<div class="container-fluid p-5">
  <h2 class="text-center mb-4">Shopping cart</h2>
  
  <div class="table-responsive w-100">
    <table class="table table-bordered align-middle text-center shadow-sm bg-white">
      <thead class="bg-light">
        <tr>
          <th>Remove</th>
          <th>Image</th>
          <th>Product(s)</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let item of cart; let i = index">
          <td>
            <input type="checkbox" (change)="removeItem(i)">
          </td>
          <td>
            <img [src]="item.image" style="width: 60px; height: 60px; object-fit: contain;">
          </td>
          <td class="text-start fw-bold">{{item.name}}</td>
          <td>${{item.price}}</td>
          <td style="width: 100px;">
            <input type="number" class="form-control text-center" [(ngModel)]="item.qty" min="1">
          </td>
          <td class="text-danger fw-bold">${{item.price * item.qty | number:'1.2-2'}}</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-3">
    <h4 class="me-4 text-danger fw-bold">Tổng tiền: ${{getTotalPrice() | number:'1.2-2'}}</h4>
    <button class="btn btn-info text-white" (click)="updateCart()">Update shopping cart</button>
    <button class="btn btn-secondary" (click)="continueShopping()">Continue shopping</button>
  </div>
</div>
