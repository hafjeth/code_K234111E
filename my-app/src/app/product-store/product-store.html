<div class="container-fluid p-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Product Store</h2>
    <button class="btn btn-warning" (click)="goToCart()">🛒 View Cart</button>
  </div>

  <div class="row w-100">
    <div class="col-md-4 mb-4" *ngFor="let p of products">
      <div class="card h-100 text-center p-3 shadow-sm">
        <img [src]="p.image" class="card-img-top mx-auto" style="width: 150px; height: 150px; object-fit: contain;">
        <div class="card-body d-flex flex-column">
          <h6 class="card-title text-primary">{{p.name}}</h6>
          <p class="text-muted small">⭐⭐⭐⭐⭐</p>
          <p class="fs-5 fw-bold mt-auto">${{p.price}}</p>
          <button class="btn btn-info text-white mt-2" (click)="addToCart(p)">ADD TO CART</button>
        </div>
      </div>
    </div>
  </div>
</div>
